services:
  backend:
    build:
      context: ./backend
    container_name: converter-backend
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    environment:
      GHOSTSCRIPT_CMD: ${GHOSTSCRIPT_CMD:-gs}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-http://localhost:5001,http://127.0.0.1:5001,http://localhost:3000,http://127.0.0.1:3000}
    volumes:
      - ./backend:/app
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: converter-frontend
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-5001}:5001"
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_API_BASE_URL: ${PUBLIC_API_BASE_URL:-http://localhost:5000}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: converter-cloudflared
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    profiles:
      - tunnel
