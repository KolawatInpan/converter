services:
  backend:
    build:
      context: ./backend
    container_name: converter-backend
    ports:
      - "5000:5000"
    environment:
      GHOSTSCRIPT_CMD: gs
    volumes:
      - ./backend:/app
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: converter-frontend
    depends_on:
      - backend
    ports:
      - "5001:5001"
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_API_BASE_URL: http://localhost:5000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    restart: unless-stopped
