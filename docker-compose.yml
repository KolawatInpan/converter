services:
  backend:
    build:
      context: ./backend
    container_name: converter-backend
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    environment:
      GHOSTSCRIPT_CMD: ${GHOSTSCRIPT_CMD:-gs}
      CORS_ALLOW_ORIGINS: http://${LAN_HOST_IP:-192.168.1.5}:${FRONTEND_PORT:-5001},http://localhost:${FRONTEND_PORT:-5001},http://127.0.0.1:${FRONTEND_PORT:-5001},http://localhost:3000,http://127.0.0.1:3000
    volumes:
      - ./backend:/app
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: converter-frontend
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-5001}:5001"
    environment:
      CHOKIDAR_USEPOLLING: "true"
      FRONTEND_PORT: ${FRONTEND_PORT:-5001}
      LAN_HOST_IP: ${LAN_HOST_IP:-192.168.1.5}
      VITE_API_BASE_URL: http://${LAN_HOST_IP:-192.168.1.5}:${BACKEND_PORT:-5000}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    restart: unless-stopped
